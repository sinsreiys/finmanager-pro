<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FinManager PRO | Dashboard Financiero</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      color: #0f172a;
      line-height: 1.5;
      font-size: 15px;
    }

    /* Temas */
    body.cream {
      --bg-primary: #f8fafc;
      --bg-card: #ffffff;
      --bg-elevated: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --accent: #3b82f6;
      --accent-light: #60a5fa;
      --shadow: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05);
      --input-bg: #ffffff;
      --input-border: #cbd5e1;
      --btn-primary-bg: #3b82f6;
      --btn-primary-hover: #2563eb;
    }
    body.dark {
      --bg-primary: #0f172a;
      --bg-card: #1e293b;
      --bg-elevated: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --border: #334155;
      --accent: #60a5fa;
      --accent-light: #93c5fd;
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.3);
      --input-bg: #334155;
      --input-border: #475569;
      --btn-primary-bg: #3b82f6;
      --btn-primary-hover: #60a5fa;
    }
    body.blue {
      --bg-primary: #eef2ff;
      --bg-card: #ffffff;
      --bg-elevated: #f8fafc;
      --text-primary: #1e3a8a;
      --text-secondary: #3b82f6;
      --text-muted: #64748b;
      --border: #cbd5e1;
      --accent: #3b82f6;
      --accent-light: #60a5fa;
      --shadow: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05);
      --input-bg: #ffffff;
      --input-border: #cbd5e1;
      --btn-primary-bg: #3b82f6;
      --btn-primary-hover: #2563eb;
    }
    body.cyan {
      --bg-primary: #ecfeff;
      --bg-card: #ffffff;
      --bg-elevated: #f0fdfa;
      --text-primary: #164e63;
      --text-secondary: #0891b2;
      --text-muted: #5b8b9e;
      --border: #cffafe;
      --accent: #06b6d4;
      --accent-light: #22d3ee;
      --shadow: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05);
      --input-bg: #ffffff;
      --input-border: #cffafe;
      --btn-primary-bg: #06b6d4;
      --btn-primary-hover: #0891b2;
    }
    body.purple {
      --bg-primary: #faf5ff;
      --bg-card: #ffffff;
      --bg-elevated: #f3e8ff;
      --text-primary: #4c1d95;
      --text-secondary: #8b5cf6;
      --text-muted: #9ca3af;
      --border: #e9d5ff;
      --accent: #8b5cf6;
      --accent-light: #a78bfa;
      --shadow: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05);
      --input-bg: #ffffff;
      --input-border: #e9d5ff;
      --btn-primary-bg: #8b5cf6;
      --btn-primary-hover: #7c3aed;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    /* Layout principal */
    .app-shell {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      padding: 20px 0;
      transition: all 0.2s;
      z-index: 100;
    }

    .sidebar__logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .sidebar__logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: white;
    }

    .sidebar__logo-text {
      font-size: 1.1rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text-primary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sidebar__nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 12px;
    }

    .sidebar__section-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      padding: 12px 12px 4px;
    }

    .sidebar__link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 10px;
      color: var(--text-secondary);
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
    }

    .sidebar__link:hover {
      background: var(--bg-elevated);
      color: var(--text-primary);
      transform: translateX(4px);
    }

    .sidebar__link.active {
      background: var(--bg-elevated);
      color: var(--accent);
      border-left: 3px solid var(--accent);
    }

    .sidebar__footer {
      padding: 20px;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }

    .sidebar__user {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 6px;
      border-radius: 10px;
    }

    .sidebar__user:hover {
      background: var(--bg-elevated);
    }

    .sidebar__avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      background-size: cover;
      background-position: center;
    }

    /* Topbar */
    .topbar {
      position: fixed;
      top: 0;
      left: 260px;
      right: 0;
      height: 64px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 90;
    }

    .topbar__title {
      font-size: 1.2rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--text-primary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .topbar__search {
      position: relative;
      width: 260px;
    }

    .topbar__search-input {
      width: 100%;
      padding: 7px 14px 7px 36px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 40px;
      color: var(--text-primary);
      font-size: 0.8rem;
    }

    .topbar__search-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .topbar__search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .topbar__actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* Main content */
    .main-content {
      margin-left: 260px;
      margin-top: 64px;
      padding: 24px;
      width: 100%;
    }

    /* Stats grid */
    .stats-grid, .loans-grid, .goals-grid, .budgets-grid, .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }

    .stat-card, .loan-card, .goal-card, .budget-card, .credit-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      transition: all 0.2s;
    }

    .stat-card:hover, .loan-card:hover, .goal-card:hover, .budget-card:hover, .credit-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent-light);
    }

    .stat-card__header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .stat-card__label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .stat-card__icon {
      font-size: 1.8rem;
      opacity: 0.7;
    }

    .stat-card__value {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .stat-card__change {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .stat-card__change.up {
      background: rgba(16,185,129,0.1);
      color: #10b981;
    }

    .stat-card__change.down {
      background: rgba(239,68,68,0.1);
      color: #ef4444;
    }

    .balances-section {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .balances-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-top: 12px;
    }

    .balance-item {
      background: var(--bg-elevated);
      border-radius: 16px;
      padding: 14px;
      text-align: center;
    }

    .balance-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .balance-value input {
      width: 100px;
      padding: 4px 8px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      color: var(--text-primary);
      text-align: center;
      font-weight: 600;
    }

    .lists-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .list-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 16px;
    }

    .list-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .transaction-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .transaction-amount.income { color: #10b981; }
    .transaction-amount.expense { color: #ef4444; }

    .filter-panel {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }

    .filter-panel .form-group {
      flex: 1;
      min-width: 120px;
    }

    .form-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .form-control, select.form-control {
      width: 100%;
      padding: 8px 12px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 0.8rem;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn {
      padding: 7px 16px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.75rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--btn-primary-bg);
      color: white;
    }

    .btn-primary:hover {
      background: var(--btn-primary-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--bg-elevated);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: rgba(239,68,68,0.1);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.2);
    }

    .btn-sm {
      padding: 3px 8px;
      font-size: 0.65rem;
    }

    .table-wrapper {
      background: var(--bg-card);
      border-radius: 20px;
      border: 1px solid var(--border);
      overflow-x: auto;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table th {
      text-align: left;
      padding: 12px 16px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    .table td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    .table tbody tr:hover td {
      background: var(--bg-elevated);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: var(--bg-card);
      border-radius: 24px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal__header {
      padding: 20px 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal__close {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--text-muted);
    }

    .modal__body {
      padding: 20px;
    }

    .modal__footer {
      padding: 16px 20px 20px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .calendar-container {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      text-align: center;
    }

    .calendar-day {
      background: var(--bg-elevated);
      border-radius: 10px;
      padding: 8px 4px;
      cursor: pointer;
      font-size: 0.75rem;
    }

    .calendar-day.has-event {
      background: var(--accent);
      color: white;
    }

    .calendar-day.today {
      border: 1px solid var(--accent);
      font-weight: bold;
    }

    .module-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .module-content {
      background: var(--bg-elevated);
      padding: 12px;
      border-radius: 14px;
      min-height: 100px;
    }

    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1100;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 10px 16px;
      border-left: 3px solid var(--accent);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .progress-bar {
      height: 6px;
      background: var(--bg-elevated);
      border-radius: 10px;
      overflow: hidden;
      margin: 8px 0;
    }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 10px; }
    .badge-warning { background: rgba(239,68,68,0.1); color: #ef4444; padding: 2px 6px; border-radius: 20px; font-size: 0.65rem; }
    .text-success { color: #10b981; font-weight: 600; }
    .text-danger { color: #ef4444; font-weight: 600; }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); position: fixed; z-index: 200; }
      .sidebar.open { transform: translateX(0); }
      .topbar, .main-content { margin-left: 0; }
      .topbar__search { width: 160px; }
      .stats-grid, .balances-grid, .lists-container { grid-template-columns: 1fr; }
      .mobile-menu-toggle { display: block; }
    }
    .mobile-menu-toggle { display: none; background: none; border: none; font-size: 22px; color: var(--text-primary); cursor: pointer; }
  </style>
</head>
<body>
<div id="appRoot"></div>

<script>
  (function(){
    // ========== VARIABLES GLOBALES ==========
    let currentUser = null;
    let users = [];
    let companies = [];
    let companyMembers = [];
    let currentCompanyId = null;
    let companyData = {};
    
    let transactions = [];
    let uploadedInvoices = [];
    let createdInvoices = [];
    let events = [];
    let budgets = [];
    let savingsGoals = [];
    let loans = [];
    let creditCards = [];
    let balances = { cash: 0, bank: 0, savings: 0, investments: 0 };
    let customCategories = { income: ['Salario','Freelance','Inversiones','Regalos','Facturación'], expense: ['Comida','Transporte','Vivienda','Entretenimiento','Salud','Suscripciones','Compras','Facturación'] };
    
    const BUDGET_TYPES = {
      CATEGORY: 'category',
      LIVE_ALONE: 'live_alone',
      PETS: 'pets',
      FAMILY: 'family',
      LARGE_FAMILY: 'large_family',
      LEISURE: 'leisure',
      BUSINESS: 'business',
      CUSTOM: 'custom'
    };
    const BUDGET_TYPE_NAMES = {
      [BUDGET_TYPES.CATEGORY]: 'Por categoría',
      [BUDGET_TYPES.LIVE_ALONE]: 'Vivir solo',
      [BUDGET_TYPES.PETS]: 'Mascotas',
      [BUDGET_TYPES.FAMILY]: 'Familia (estándar)',
      [BUDGET_TYPES.LARGE_FAMILY]: 'Familia numerosa',
      [BUDGET_TYPES.LEISURE]: 'Ocio',
      [BUDGET_TYPES.BUSINESS]: 'Empresa',
      [BUDGET_TYPES.CUSTOM]: 'Personalizado'
    };

    // ========== PERSISTENCIA ==========
    function loadAllData() {
      users = JSON.parse(localStorage.getItem('fm_users') || '[]');
      companies = JSON.parse(localStorage.getItem('fm_companies') || '[]');
      companyMembers = JSON.parse(localStorage.getItem('fm_companyMembers') || '[]');
      const storedCompanyData = localStorage.getItem('fm_companyData');
      if (storedCompanyData) companyData = JSON.parse(storedCompanyData);
      const storedCurrentUser = localStorage.getItem('fm_currentUser');
      if (storedCurrentUser) {
        currentUser = JSON.parse(storedCurrentUser);
        const storedCompany = localStorage.getItem('fm_currentCompanyId');
        if (storedCompany && companies.some(c => c.id === storedCompany)) {
          currentCompanyId = storedCompany;
        } else if (companies.length > 0) {
          const member = companyMembers.find(m => m.userId === currentUser.id);
          if (member) currentCompanyId = member.companyId;
          else if (companies.length > 0) currentCompanyId = companies[0].id;
        }
      }
      loadCompanyData();
    }

    function loadCompanyData() {
      if (!currentCompanyId) return;
      if (!companyData[currentCompanyId]) {
        companyData[currentCompanyId] = {
          transactions: [],
          uploadedInvoices: [],
          createdInvoices: [],
          events: [],
          budgets: [],
          savingsGoals: [],
          loans: [],
          creditCards: [],
          balances: { cash: 1250.00, bank: 3500.00, savings: 5200.00, investments: 1500.00 },
          customCategories: { income: ['Salario','Freelance','Inversiones','Regalos','Facturación'], expense: ['Comida','Transporte','Vivienda','Entretenimiento','Salud','Suscripciones','Compras','Facturación'] },
          companyProfile: { type: 'individual', businessType: '', specialization: '', employees: 0, capital: 0, annualRevenue: 0, legalForm: '', website: '', phone2: '', address: '', modules: [] }
        };
      }
      transactions = companyData[currentCompanyId].transactions;
      uploadedInvoices = companyData[currentCompanyId].uploadedInvoices;
      createdInvoices = companyData[currentCompanyId].createdInvoices;
      events = companyData[currentCompanyId].events;
      budgets = companyData[currentCompanyId].budgets;
      savingsGoals = companyData[currentCompanyId].savingsGoals;
      loans = companyData[currentCompanyId].loans;
      creditCards = companyData[currentCompanyId].creditCards;
      balances = companyData[currentCompanyId].balances;
      customCategories = companyData[currentCompanyId].customCategories;
    }

    function saveAllData() {
      if (currentCompanyId && companyData[currentCompanyId]) {
        companyData[currentCompanyId].transactions = transactions;
        companyData[currentCompanyId].uploadedInvoices = uploadedInvoices;
        companyData[currentCompanyId].createdInvoices = createdInvoices;
        companyData[currentCompanyId].events = events;
        companyData[currentCompanyId].budgets = budgets;
        companyData[currentCompanyId].savingsGoals = savingsGoals;
        companyData[currentCompanyId].loans = loans;
        companyData[currentCompanyId].creditCards = creditCards;
        companyData[currentCompanyId].balances = balances;
        companyData[currentCompanyId].customCategories = customCategories;
      }
      localStorage.setItem('fm_users', JSON.stringify(users));
      localStorage.setItem('fm_companies', JSON.stringify(companies));
      localStorage.setItem('fm_companyMembers', JSON.stringify(companyMembers));
      localStorage.setItem('fm_companyData', JSON.stringify(companyData));
      if (currentUser) localStorage.setItem('fm_currentUser', JSON.stringify(currentUser));
      else localStorage.removeItem('fm_currentUser');
      if (currentCompanyId) localStorage.setItem('fm_currentCompanyId', currentCompanyId);
    }

    function showToast(msg, type='info') {
      let container = document.getElementById('toastContainer');
      if (!container) {
        container = document.createElement('div');
        container.className = 'toast-container';
        container.id = 'toastContainer';
        document.body.appendChild(container);
      }
      const toast = document.createElement('div');
      toast.className = `toast toast--${type}`;
      toast.innerHTML = `<div>${msg}</div>`;
      container.appendChild(toast);

    }
    function formatCurrency(amount) { return '$' + amount.toFixed(2); }
    function formatDate(dateStr) { return new Date(dateStr).toLocaleDateString('es-ES'); }
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    function getUniqueCategories() { return [...new Set([...customCategories.income, ...customCategories.expense])]; }
    function getNetWorth() { return balances.cash + balances.bank + balances.savings + balances.investments; }

    function exportToCSV(data, filename) {
      if (!data || data.length === 0) { showToast('No hay datos para exportar', 'warning'); return; }
      const headers = Object.keys(data[0]).join(',');
      const rows = data.map(row => Object.values(row).map(value => `"${value}"`).join(','));
      const csv = [headers, ...rows].join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.href = url;
      link.setAttribute('download', filename);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }
    function backupData() {
      const allData = { users, companies, companyMembers, companyData, currentUser, currentCompanyId };
      const json = JSON.stringify(allData, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.href = url;
      link.setAttribute('download', `finmanager_backup_${new Date().toISOString().slice(0,19)}.json`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      showToast('Backup descargado correctamente', 'success');
    }
    function restoreBackup(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.users) users = data.users;
          if (data.companies) companies = data.companies;
          if (data.companyMembers) companyMembers = data.companyMembers;
          if (data.companyData) companyData = data.companyData;
          if (data.currentUser) currentUser = data.currentUser;
          if (data.currentCompanyId) currentCompanyId = data.currentCompanyId;
          saveAllData();
          showToast('Backup restaurado correctamente. Recarga la página.', 'success');
          setTimeout(() => window.location.reload(), 1500);
        } catch (err) { showToast('Archivo de backup inválido', 'danger'); }
      };
      reader.readAsText(file);
    }

    function getStats() {
      const totalIncome = transactions.filter(t => t.type === 'income').reduce((s,t)=>s+t.amount,0);
      const totalExpenses = transactions.filter(t => t.type === 'expense').reduce((s,t)=>s+t.amount,0);
      const changeIncome = totalIncome ? ((totalIncome - (totalIncome*0.92)) / (totalIncome*0.92) * 100).toFixed(1) : 0;
      const changeExpenses = totalExpenses ? ((totalExpenses - (totalExpenses*1.05)) / (totalExpenses*1.05) * 100).toFixed(1) : 0;
      return { totalIncome, totalExpenses, changeIncome, changeExpenses };
    }

    function renderTransactionsTable() {
      let filtered = [...transactions];
      const cat = document.getElementById('filterCat')?.value;
      const type = document.getElementById('filterType')?.value;
      const from = document.getElementById('dateFrom')?.value;
      const to = document.getElementById('dateTo')?.value;
      if (cat && cat !== 'all') filtered = filtered.filter(t => t.category === cat);
      if (type && type !== 'all') filtered = filtered.filter(t => t.type === type);
      if (from) filtered = filtered.filter(t => t.date >= from);
      if (to) filtered = filtered.filter(t => t.date <= to);
      const tbody = document.getElementById('transactionsTbody');
      if (!tbody) return;
      if (filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="7">No hay transacciones'; return; }
      tbody.innerHTML = filtered.map(t => {
        let tagName = '';
        if (t.budgetTag) tagName = t.budgetTag;
        return `<tr data-id="${t.id}"><td>${formatDate(t.date)}</td><td>${escapeHtml(t.description)}</td><td>${escapeHtml(t.provider || '-')}</td><td>${escapeHtml(t.category)}</td><td>${escapeHtml(tagName || '-')}</td><td class="${t.type === 'income' ? 'text-success' : 'text-danger'}">${formatCurrency(t.amount)}</td>
        <td><button class="btn btn-sm btn-secondary editTx" data-id="${t.id}">✏️</button> <button class="btn btn-sm btn-danger deleteTx" data-id="${t.id}">🗑️</button></td>
        </tr>`;
      }).join('');
      document.querySelectorAll('.editTx').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); openTransactionModal(id); }));
      document.querySelectorAll('.deleteTx').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); if (confirm('¿Eliminar?')) { transactions = transactions.filter(t => t.id !== id); saveAllData(); renderCurrentView(); showToast('Eliminada', 'danger'); } }));
    }

    function renderChart() {
      const canvas = document.getElementById('expenseChart');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      if (chart) chart.destroy();
      const expensesByCat = {};
      transactions.filter(t => t.type === 'expense').forEach(t => { expensesByCat[t.category] = (expensesByCat[t.category] || 0) + t.amount; });

      const data = Object.values(expensesByCat);

      chart = new Chart(ctx, { type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: ['#3b82f6','#10b981','#ef4444','#f59e0b','#8b5cf6','#06b6d4'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } } });
    }

v>`;

      document.getElementById('cancelModalBtn')?.addEventListener('click', close);
      document.getElementById('modalBackdrop')?.addEventListener('click', (e) => { if (e.target === document.getElementById('modalBackdrop')) close(); });
      const typeSelect = document.getElementById('type');
      const catSelect = document.getElementById('category');
      typeSelect?.addEventListener('change', () => { catSelect.innerHTML = getCategoryOptions(typeSelect.value); });
      document.getElementById('txForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const newTx = {
          id: tx ? tx.id : Date.now().toString(),
          description: document.getElementById('desc').value,
          provider: document.getElementById('provider').value,
          amount: parseFloat(document.getElementById('amount').value),
          date: document.getElementById('date').value,
          type: document.getElementById('type').value,
          category: document.getElementById('category').value,
          budgetTag: document.getElementById('budgetTag').value
        };
        if (isNaN(newTx.amount) || newTx.amount <= 0) { showToast('Monto inválido', 'danger'); return; }
        if (tx) { const idx = transactions.findIndex(t => t.id === tx.id); transactions[idx] = newTx; }
        else transactions.push(newTx);

    function getCategoryOptions(type, selected='') {
      const cats = type === 'income' ? customCategories.income : customCategories.expense;

    // ========== TARJETAS ==========
    function renderCardsView() {
      let html = `<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;"><h2>💳 Tarjetas de crédito / Débito</h2><button class="btn btn-primary" id="addCardBtn">+ Nueva tarjeta</button></div><div class="cards-section" id="cardsContainer"></div>`;
      document.getElementById('dynamicView').innerHTML = html;
      renderCardsList();
      document.getElementById('addCardBtn')?.addEventListener('click', () => openCardModal());
    }
    function renderCardsList() {
      const container = document.getElementById('cardsContainer');
      if (!container) return;
      if (creditCards.length === 0) { container.innerHTML = `<div class="credit-card">No hay tarjetas registradas.</div>`; return; }
      container.innerHTML = creditCards.map(card => {
        const usagePercent = (card.balance / card.limit) * 100;
        const available = card.limit - card.balance;
        const dueDate = card.dueDay ? `${card.dueDay} de cada mes` : 'Sin fecha';
        return `<div class="credit-card" data-id="${card.id}"><div class="credit-card__type">${escapeHtml(card.issuer || 'Tarjeta')}</div><div class="credit-card__number">**** ${card.lastDigits || '0000'}</div><div class="credit-card__balance">${formatCurrency(card.balance)}</div><div>Límite: ${formatCurrency(card.limit)} | Disponible: ${formatCurrency(available)}</div><div>Fecha de corte: ${dueDate} | Interés: ${card.interestRate}%</div><div class="progress-bar"><div class="progress-fill ${usagePercent > 90 ? 'over-budget' : ''}" style="width: ${Math.min(usagePercent, 100)}%;"></div></div><div class="budget-actions"><button class="btn btn-sm btn-secondary payCardBtn" data-id="${card.id}">💰 Pagar</button><button class="btn btn-sm btn-secondary editCardBtn" data-id="${card.id}">✏️ Editar</button><button class="btn btn-sm btn-danger deleteCardBtn" data-id="${card.id}">🗑️ Eliminar</button></div>${card.payments && card.payments.length ? `<details><summary>Historial de pagos (${card.payments.length})</summary><ul>${card.payments.map(p => `<li>${formatDate(p.date)} - ${formatCurrency(p.amount)}</li>`).join('')}</ul></details>` : ''}</div>`;
      }).join('');
      document.querySelectorAll('.payCardBtn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); recordCardPayment(id); }));
      document.querySelectorAll('.editCardBtn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); openCardModal(id); }));
      document.querySelectorAll('.deleteCardBtn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); deleteCard(id); }));
    }
    function openCardModal(cardId = null) {
      const card = cardId ? creditCards.find(c => c.id === cardId) : null;
      const modalHtml = `<div class="modal-backdrop" id="modalBackdrop"><div class="modal" style="max-width: 500px;"><div class="modal__header"><h3>${card ? 'Editar tarjeta' : 'Nueva tarjeta'}</h3><button class="modal__close" id="closeModalBtn">&times;</button></div><div class="modal__body"><form id="cardForm"><div class="form-group"><label class="form-label">Nombre / Entidad</label><input type="text" id="cardName" class="form-control" value="${escapeHtml(card?.name || '')}" required></div><div class="form-group"><label class="form-label">Emisor</label><input type="text" id="cardIssuer" class="form-control" value="${escapeHtml(card?.issuer || '')}"></div><div class="form-group"><label class="form-label">Últimos 4 dígitos</label><input type="text" id="cardLastDigits" class="form-control" maxlength="4" value="${card?.lastDigits || ''}"></div><div class="form-group"><label class="form-label">Límite ($)</label><input type="number" step="0.01" id="cardLimit" class="form-control" value="${card?.limit || ''}" required></div><div class="form-group"><label class="form-label">Saldo actual ($)</label><input type="number" step="0.01" id="cardBalance" class="form-control" value="${card?.balance || 0}"></div><div class="form-group"><label class="form-label">Día de corte (1-31)</label><input type="number" id="cardDueDay" class="form-control" min="1" max="31" value="${card?.dueDay || ''}"></div><div class="form-group"><label class="form-label">Interés mensual (%)</label><input type="number" step="0.1" id="cardInterest" class="form-control" value="${card?.interestRate || 0}"></div><div class="modal__footer"><button type="button" class="btn btn-secondary" id="cancelModalBtn">Cancelar</button><button type="submit" class="btn btn-primary">Guardar</button></div></form></div></div></div>`;
      const container = document.getElementById('modalContainer');
      container.innerHTML = modalHtml;
      const close = () => container.innerHTML = '';
      document.getElementById('closeModalBtn')?.addEventListener('click', close);
      document.getElementById('cancelModalBtn')?.addEventListener('click', close);
      document.getElementById('modalBackdrop')?.addEventListener('click', (e) => { if (e.target === document.getElementById('modalBackdrop')) close(); });
      document.getElementById('cardForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('cardName').value.trim();
        const issuer = document.getElementById('cardIssuer').value.trim();
        const lastDigits = document.getElementById('cardLastDigits').value.trim();
        const limit = parseFloat(document.getElementById('cardLimit').value);
        let balance = parseFloat(document.getElementById('cardBalance').value);
        const dueDay = parseInt(document.getElementById('cardDueDay').value);
        const interestRate = parseFloat(document.getElementById('cardInterest').value) || 0;
        if (!name || isNaN(limit) || limit <= 0) { showToast('Datos inválidos', 'danger'); return; }
        if (isNaN(balance)) balance = 0;
        if (balance > limit) balance = limit;
        const newCard = { id: card ? card.id : Date.now().toString(), name, issuer, lastDigits, limit, balance, dueDay: isNaN(dueDay) ? null : dueDay, interestRate, payments: card?.payments || [] };
        if (card) { const idx = creditCards.findIndex(c => c.id === card.id); creditCards[idx] = newCard; }
        else creditCards.push(newCard);
        saveAllData(); close(); renderCardsView(); showToast(card ? 'Tarjeta actualizada' : 'Tarjeta añadida', 'success');
      });
    }
    function deleteCard(id) {
      if (confirm('¿Eliminar esta tarjeta?')) { creditCards = creditCards.filter(c => c.id !== id); saveAllData(); renderCardsView(); showToast('Tarjeta eliminada', 'info'); }
    }
    function recordCardPayment(id) {
      const card = creditCards.find(c => c.id === id);
      if (!card) return;
      const maxPay = card.balance;
      if (maxPay <= 0) { showToast('Esta tarjeta no tiene saldo pendiente', 'info'); return; }
      const amount = parseFloat(prompt(`Saldo actual: ${formatCurrency(card.balance)}\n¿Cuánto deseas pagar?`, maxPay));
      if (!isNaN(amount) && amount > 0 && amount <= maxPay) {
        card.balance -= amount;
        if (!card.payments) card.payments = [];
        card.payments.push({ date: new Date().toISOString().split('T')[0], amount: amount });
        saveAllData();
        renderCardsView();
        showToast(`Pagado ${formatCurrency(amount)} de la tarjeta ${card.name}`, 'success');
        transactions.push({ id: Date.now().toString(), date: new Date().toISOString().split('T')[0], description: `Pago tarjeta ${card.name}`, amount: amount, type: 'expense', category: 'Tarjetas', provider: card.issuer || card.name, budgetTag: '' });
        saveAllData();
        showToast('Se ha registrado una transacción de gasto', 'info');
      } else if (amount > maxPay) { showToast('No puedes pagar más que el saldo actual', 'danger'); }
    }

    // ========== PRESUPUESTOS ==========
    function renderBudgetView() {
      let selectedMonth = new Date().getMonth();
      let selectedYear = new Date().getFullYear();
      const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
      let years = [];
      for (let y = selectedYear - 2; y <= selectedYear + 2; y++) years.push(y);
      let html = `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;"><h2>📊 Presupuestos mensuales</h2><button class="btn btn-primary" id="addBudgetBtn">+ Nuevo presupuesto</button></div>
        <div style="display: flex; gap: 16px; margin-bottom: 20px;"><div class="form-group"><label>Mes</label><select id="budgetMonthSelect" class="form-control">${monthNames.map((m, idx) => `<option value="${idx}" ${idx === selectedMonth ? 'selected' : ''}>${m}</option>`).join('')}</select></div>
        <div class="form-group"><label>Año</label><select id="budgetYearSelect" class="form-control">${years.map(y => `<option value="${y}" ${y === selectedYear ? 'selected' : ''}>${y}</option>`).join('')}</select></div>
        <button class="btn btn-secondary" id="refreshBudgetsBtn">Actualizar</button></div>
        <div class="budgets-section" id="budgetsContainer"></div>
      `;
      document.getElementById('dynamicView').innerHTML = html;
      function loadBudgets() {
        const month = parseInt(document.getElementById('budgetMonthSelect').value);
        const year = parseInt(document.getElementById('budgetYearSelect').value);
        const currentBudgets = budgets.filter(b => b.month === month && b.year === year);
        const container = document.getElementById('budgetsContainer');
        if (!container) return;
        if (currentBudgets.length === 0) { container.innerHTML = `<div class="credit-card">No hay presupuestos para ${monthNames[month]} de ${year}.</div>`; return; }
        container.innerHTML = currentBudgets.map(budget => {
          const spent = getSpentForBudget(budget);
          let amount = budget.amount;
          if (budget.type === BUDGET_TYPES.LARGE_FAMILY && budget.familyMultiplier) amount = budget.amount * budget.familyMultiplier;
          const percentage = (spent / amount) * 100;
          const overBudget = spent > amount;
          const title = getBudgetTitle(budget);
          return `<div class="budget-card"><div class="budget-card-header"><span class="budget-category">${escapeHtml(title)}</span><span class="budget-amount">${formatCurrency(amount)}</span></div><div class="budget-progress"><div class="progress-bar"><div class="progress-fill ${overBudget ? 'over-budget' : ''}" style="width: ${Math.min(percentage, 100)}%;"></div></div><div class="budget-spent">Gastado: ${formatCurrency(spent)} (${percentage.toFixed(1)}%)${overBudget ? `<span class="badge-warning"> ¡Superado por ${formatCurrency(spent - amount)}!</span>` : ''}</div></div><div class="budget-actions"><button class="btn btn-sm btn-secondary editBudgetBtn" data-id="${budget.id}">✏️ Editar</button><button class="btn btn-sm btn-danger deleteBudgetBtn" data-id="${budget.id}">🗑️ Eliminar</button></div></div>`;
        }).join('');
        document.querySelectorAll('.editBudgetBtn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); openBudgetModal(id); }));
        document.querySelectorAll('.deleteBudgetBtn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); deleteBudget(id); }));
      }
      document.getElementById('refreshBudgetsBtn')?.addEventListener('click', loadBudgets);
      document.getElementById('addBudgetBtn')?.addEventListener('click', () => openBudgetModal());
      loadBudgets();
    }
    function getBudgetTitle(budget) {
      if (budget.type === BUDGET_TYPES.CATEGORY) return `Categoría: ${budget.category}`;
      if (budget.type === BUDGET_TYPES.CUSTOM) return `📝 ${budget.customName}`;
      return BUDGET_TYPE_NAMES[budget.type] || budget.type;
    }
    function getSpentForBudget(budget) {
      let spent = 0;
      const targetMonth = budget.month;
      const targetYear = budget.year;
      if (budget.type === BUDGET_TYPES.CATEGORY) {
        spent = transactions.filter(t => t.type === 'expense' && t.category === budget.category && new Date(t.date).getMonth() === targetMonth && new Date(t.date).getFullYear() === targetYear).reduce((s,t)=>s+t.amount,0);
      } else if (budget.type === BUDGET_TYPES.CUSTOM) {
        spent = transactions.filter(t => t.type === 'expense' && t.budgetTag === budget.customName && new Date(t.date).getMonth() === targetMonth && new Date(t.date).getFullYear() === targetYear).reduce((s,t)=>s+t.amount,0);
      } else {
        spent = transactions.filter(t => t.type === 'expense' && t.budgetTag === budget.type && new Date(t.date).getMonth() === targetMonth && new Date(t.date).getFullYear() === targetYear).reduce((s,t)=>s+t.amount,0);
        if (budget.type === BUDGET_TYPES.PETS) {
          spent += (budget.petFood || 0) + (budget.petCare || 0) + (budget.petInsurance || 0);
        }
      }
      return spent;
    }
    function openBudgetModal(budgetId = null) {
      const budget = budgetId ? budgets.find(b => b.id === budgetId) : null;
      const modalHtml = `<div class="modal-backdrop" id="modalBackdrop"><div class="modal"><div class="modal__header"><h3>${budget ? 'Editar presupuesto' : 'Nuevo presupuesto'}</h3><button class="modal__close" id="closeModalBtn">&times;</button></div><div class="modal__body"><form id="budgetForm"><div class="form-group"><label class="form-label">Tipo</label><select id="budgetType" class="form-control"><option value="category" ${budget?.type === 'category' ? 'selected' : ''}>Por categoría</option><option value="live_alone" ${budget?.type === 'live_alone' ? 'selected' : ''}>Vivir solo</option><option value="pets" ${budget?.type === 'pets' ? 'selected' : ''}>Mascotas</option><option value="family" ${budget?.type === 'family' ? 'selected' : ''}>Familia</option><option value="large_family" ${budget?.type === 'large_family' ? 'selected' : ''}>Familia numerosa</option><option value="leisure" ${budget?.type === 'leisure' ? 'selected' : ''}>Ocio</option><option value="business" ${budget?.type === 'business' ? 'selected' : ''}>Empresa</option><option value="custom" ${budget?.type === 'custom' ? 'selected' : ''}>Personalizado</option></select></div>
      <div id="budgetCategoryGroup" style="display:${budget?.type === 'category' ? 'block' : 'none'}"><label class="form-label">Categoría</label><select id="budgetCategory" class="form-control">${customCategories.expense.map(c=>`<option value="${c}" ${budget?.category === c ? 'selected' : ''}>${c}</option>`).join('')}</select></div>
      <div id="budgetCustomGroup" style="display:${budget?.type === 'custom' ? 'block' : 'none'}"><label class="form-label">Nombre personalizado</label><input type="text" id="budgetCustomName" class="form-control" value="${escapeHtml(budget?.customName || '')}" placeholder="Ej: Vacaciones, Compras..."></div>
      <div class="form-group"><label class="form-label">Monto límite ($)</label><input type="number" step="0.01" id="budgetAmount" class="form-control" value="${budget?.amount || ''}" required></div>
      <div class="form-group"><label class="form-label">Mes</label><select id="budgetMonth" class="form-control">${['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'].map((m,idx)=>`<option value="${idx}" ${budget?.month === idx ? 'selected' : ''}>${m}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Año</label><input type="number" id="budgetYear" class="form-control" value="${budget?.year || new Date().getFullYear()}" required></div>
      <div class="modal__footer"><button type="button" class="btn btn-secondary" id="cancelModalBtn">Cancelar</button><button type="submit" class="btn btn-primary">Guardar</button></div></form></div></div></div>`;
      const container = document.getElementById('modalContainer');
      container.innerHTML = modalHtml;
      const close = () => container.innerHTML = '';
      document.getElementById('closeModalBtn')?.addEventListener('click', close);
      document.getElementById('cancelModalBtn')?.addEventListener('click', close);
      document.getElementById('modalBackdrop')?.addEventListener('click', (e) => { if (e.target === document.getElementById('modalBackdrop')) close(); });
      const typeSelect = document.getElementById('budgetType');
      const catGroup = document.getElementById('budgetCategoryGroup');
      const customGroup = document.getElementById('budgetCustomGroup');
      typeSelect.addEventListener('change', () => {
        catGroup.style.display = typeSelect.value === 'category' ? 'block' : 'none';
        customGroup.style.display = typeSelect.value === 'custom' ? 'block' : 'none';
      });
      document.getElementById('budgetForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const type = typeSelect.value;
        const amount = parseFloat(document.getElementById('budgetAmount').value);
        const month = parseInt(document.getElementById('budgetMonth').value);
        const year = parseInt(document.getElementById('budgetYear').value);
        if (isNaN(amount) || amount <= 0) { showToast('Monto inválido', 'danger'); return; }
        const newBudget = { id: budget ? budget.id : Date.now().toString(), type, amount, month, year };
        if (type === 'category') newBudget.category = document.getElementById('budgetCategory').value;
        if (type === 'custom') newBudget.customName = document.getElementById('budgetCustomName').value;
        if (budget) { const idx = budgets.findIndex(b => b.id === budget.id); budgets[idx] = newBudget; }
        else budgets.push(newBudget);
        saveAllData(); close(); renderBudgetView(); showToast(budget ? 'Presupuesto actualizado' : 'Presupuesto agregado', 'success');
      });
    }
    function deleteBudget(id) {
      if (confirm('¿Eliminar este presupuesto?')) { budgets = budgets.filter(b => b.id !== id); saveAllData(); renderBudgetView(); showToast('Presupuesto eliminado', 'info'); }

    // ========== METAS DE AHORRO ==========
    function renderGoalsView() {
      let html = `<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;"><h2>🎯 Metas de ahorro</h2><button class="btn btn-primary" id="addGoalBtn">+ Nueva meta</button></div><div id="goalsContainer" class="goals-grid"></div>`;
      document.getElementById('dynamicView').innerHTML = html;
      document.getElementById('addGoalBtn').addEventListener('click', () => openGoalModal());
      renderGoalsList();

    function renderGoalsList() {
      const container = document.getElementById('goalsContainer');
      if (!container) return;
      if (savingsGoals.length === 0) { container.innerHTML = '<div class="goal-card">No hay metas de ahorro. Crea una nueva.</div>'; return; }
      container.innerHTML = savingsGoals.map(goal => {
        const percentage = (goal.currentAmount / goal.targetAmount) * 100;
        const remaining = goal.targetAmount - goal.currentAmount;
        return `<div class="goal-card"><h3>${escapeHtml(goal.name)}</h3><div><strong>Objetivo:</strong> ${formatCurrency(goal.targetAmount)}</div><div><strong>Progreso:</strong> ${formatCurrency(goal.currentAmount)} (${percentage.toFixed(1)}%)</div><div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(percentage,100)}%"></div></div><div><strong>Restante:</strong> ${formatCurrency(remaining)}</div><div class="budget-actions"><button class="btn btn-sm btn-secondary addToGoalBtn" data-id="${goal.id}">💰 Añadir</button><button class="btn btn-sm btn-secondary editGoalBtn" data-id="${goal.id}">✏️ Editar</button><button class="btn btn-sm btn-danger deleteGoalBtn" data-id="${goal.id}">🗑️ Eliminar</button></div></div>`;
      }).join('');
      document.querySelectorAll('.addToGoalBtn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); addToGoal(id); }));
      document.querySelectorAll('.editGoalBtn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); openGoalModal(id); }));
      document.querySelectorAll('.deleteGoalBtn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); deleteGoal(id); }));
    }
    function openGoalModal(goalId = null) {
      const goal = goalId ? savingsGoals.find(g => g.id === goalId) : null;
      const modalHtml = `<div class="modal-backdrop" id="modalBackdrop"><div class="modal"><div class="modal__header"><h3>${goal ? 'Editar meta' : 'Nueva meta'}</h3><button class="modal__close" id="closeModalBtn">&times;</button></div><div class="modal__body"><form id="goalForm"><div class="form-group"><label class="form-label">Nombre</label><input type="text" id="goalName" class="form-control" value="${escapeHtml(goal?.name || '')}" required></div><div class="form-group"><label class="form-label">Monto objetivo ($)</label><input type="number" step="0.01" id="goalTarget" class="form-control" value="${goal?.targetAmount || ''}" required></div><div class="form-group"><label class="form-label">Monto actual ($)</label><input type="number" step="0.01" id="goalCurrent" class="form-control" value="${goal?.currentAmount || 0}"></div><div class="modal__footer"><button type="button" class="btn btn-secondary" id="cancelModalBtn">Cancelar</button><button type="submit" class="btn btn-primary">Guardar</button></div></form></div></div></div>`;
      const container = document.getElementById('modalContainer');
      container.innerHTML = modalHtml;
      const close = () => container.innerHTML = '';
      document.getElementById('closeModalBtn')?.addEventListener('click', close);
      document.getElementById('cancelModalBtn')?.addEventListener('click', close);
      document.getElementById('modalBackdrop')?.addEventListener('click', (e) => { if (e.target === document.getElementById('modalBackdrop')) close(); });
      document.getElementById('goalForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('goalName').value.trim();
        const targetAmount = parseFloat(document.getElementById('goalTarget').value);
        let currentAmount = parseFloat(document.getElementById('goalCurrent').value);
        if (!name || isNaN(targetAmount) || targetAmount <= 0) { showToast('Datos inválidos', 'danger'); return; }
        if (isNaN(currentAmount)) currentAmount = 0;
        if (currentAmount > targetAmount) currentAmount = targetAmount;
        if (goal) {
          goal.name = name; goal.targetAmount = targetAmount; goal.currentAmount = currentAmount;
          const idx = savingsGoals.findIndex(g => g.id === goal.id); savingsGoals[idx] = goal;
        } else {
          savingsGoals.push({ id: Date.now().toString(), name, targetAmount, currentAmount });
        }
        saveAllData(); close(); renderGoalsView(); showToast(goal ? 'Meta actualizada' : 'Meta creada', 'success');
      });
    }
    function deleteGoal(id) {
      if (confirm('¿Eliminar esta meta?')) { savingsGoals = savingsGoals.filter(g => g.id !== id); saveAllData(); renderGoalsView(); showToast('Meta eliminada', 'info'); }
    }
    function addToGoal(id) {
      const goal = savingsGoals.find(g => g.id === id);
      if (!goal) return;
      const remaining = goal.targetAmount - goal.currentAmount;
      if (remaining <= 0) { showToast('¡Ya alcanzaste tu meta!', 'success'); return; }
      const amount = parseFloat(prompt(`Meta: ${goal.name}\nRestante: ${formatCurrency(remaining)}\n¿Cuánto quieres añadir?`, remaining));
      if (!isNaN(amount) && amount > 0 && amount <= remaining) {
        goal.currentAmount += amount;
        saveAllData();
        renderGoalsView();
        showToast(`Añadido ${formatCurrency(amount)} a la meta "${goal.name}"`, 'success');
        transactions.push({ id: Date.now().toString(), date: new Date().toISOString().split('T')[0], description: `Ahorro para meta: ${goal.name}`, amount: amount, type: 'expense', category: 'Ahorro', provider: '', budgetTag: '' });
        saveAllData();
      } else if (amount > remaining) showToast('No puedes añadir más que el restante', 'danger');
    }

    // ========== PRÉSTAMOS ==========
    function renderLoansView() {
      let html = `<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;"><h2>💰 Préstamos</h2><button class="btn btn-primary" id="addLoanBtn">+ Nuevo préstamo</button></div><div id="loansContainer" class="loans-grid"></div>`;
      document.getElementById('dynamicView').innerHTML = html;
      document.getElementById('addLoanBtn').addEventListener('click', () => openLoanModal());
      renderLoansList();
    }
    function renderLoansList() {
      const container = document.getElementById('loansContainer');
      if (!container) return;
      if (loans.length === 0) { container.innerHTML = '<div class="loan-card">No hay préstamos registrados.</div>'; return; }
      container.innerHTML = loans.map(loan => {
        const paidTotal = loan.payments ? loan.payments.reduce((s,p)=>s+p.amount,0) : 0;
        const remaining = loan.principal - paidTotal;
        const percentPaid = (paidTotal / loan.principal) * 100;
        return `<div class="loan-card"><h3>${escapeHtml(loan.name)}</h3><div><strong>Prestamista:</strong> ${escapeHtml(loan.lender)}</div><div><strong>Principal:</strong> ${formatCurrency(loan.principal)}</div><div><strong>Interés anual:</strong> ${loan.interestRate}%</div><div><strong>Plazo:</strong> ${loan.termMonths} meses</div><div><strong>Inicio:</strong> ${formatDate(loan.startDate)}</div><div><strong>Pagado:</strong> ${formatCurrency(paidTotal)} | <strong>Restante:</strong> ${formatCurrency(remaining)}</div><div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(percentPaid,100)}%"></div></div><div class="budget-actions"><button class="btn btn-sm btn-secondary payLoanBtn" data-id="${loan.id}">💰 Abonar</button><button class="btn btn-sm btn-secondary editLoanBtn" data-id="${loan.id}">✏️ Editar</button><button class="btn btn-sm btn-danger deleteLoanBtn" data-id="${loan.id}">🗑️ Eliminar</button></div>${loan.payments && loan.payments.length ? `<details><summary>Historial de pagos (${loan.payments.length})</summary><ul>${loan.payments.map(p => `<li>${formatDate(p.date)} - ${formatCurrency(p.amount)}</li>`).join('')}</ul></details>` : ''}</div>`;
      }).join('');
      document.querySelectorAll('.payLoanBtn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); recordLoanPayment(id); }));
      document.querySelectorAll('.editLoanBtn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); openLoanModal(id); }));
      document.querySelectorAll('.deleteLoanBtn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); deleteLoan(id); }));
    }
    function openLoanModal(loanId = null) {
      const loan = loanId ? loans.find(l => l.id === loanId) : null;
      const modalHtml = `<div class="modal-backdrop" id="modalBackdrop"><div class="modal"><div class="modal__header"><h3>${loan ? 'Editar préstamo' : 'Nuevo préstamo'}</h3><button class="modal__close" id="closeModalBtn">&times;</button></div><div class="modal__body"><form id="loanForm"><div class="form-group"><label class="form-label">Nombre / Propósito</label><input type="text" id="loanName" class="form-control" value="${escapeHtml(loan?.name || '')}" required></div><div class="form-group"><label class="form-label">Prestamista</label><input type="text" id="loanLender" class="form-control" value="${escapeHtml(loan?.lender || '')}" required></div><div class="form-group"><label class="form-label">Monto principal ($)</label><input type="number" step="0.01" id="loanPrincipal" class="form-control" value="${loan?.principal || ''}" required></div><div class="form-group"><label class="form-label">Interés anual (%)</label><input type="number" step="0.1" id="loanInterest" class="form-control" value="${loan?.interestRate || 0}" required></div><div class="form-group"><label class="form-label">Plazo (meses)</label><input type="number" id="loanTerm" class="form-control" value="${loan?.termMonths || ''}" required></div><div class="form-group"><label class="form-label">Fecha inicio</label><input type="date" id="loanStartDate" class="form-control" value="${loan?.startDate || ''}" required></div><div class="modal__footer"><button type="button" class="btn btn-secondary" id="cancelModalBtn">Cancelar</button><button type="submit" class="btn btn-primary">Guardar</button></div></form></div></div></div>`;
      const container = document.getElementById('modalContainer');
      container.innerHTML = modalHtml;
      const close = () => container.innerHTML = '';
      document.getElementById('closeModalBtn')?.addEventListener('click', close);
      document.getElementById('cancelModalBtn')?.addEventListener('click', close);
      document.getElementById('modalBackdrop')?.addEventListener('click', (e) => { if (e.target === document.getElementById('modalBackdrop')) close(); });
      document.getElementById('loanForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('loanName').value.trim();
        const lender = document.getElementById('loanLender').value.trim();
        const principal = parseFloat(document.getElementById('loanPrincipal').value);
        const interestRate = parseFloat(document.getElementById('loanInterest').value);
        const termMonths = parseInt(document.getElementById('loanTerm').value);
        const startDate = document.getElementById('loanStartDate').value;
        if (!name || !lender || isNaN(principal) || principal <= 0 || isNaN(interestRate) || isNaN(termMonths) || termMonths <= 0 || !startDate) { showToast('Complete todos los campos', 'danger'); return; }
        if (loan) {
          loan.name = name; loan.lender = lender; loan.principal = principal; loan.interestRate = interestRate; loan.termMonths = termMonths; loan.startDate = startDate;
          const idx = loans.findIndex(l => l.id === loan.id); loans[idx] = loan;
        } else {
          loans.push({ id: Date.now().toString(), name, lender, principal, interestRate, termMonths, startDate, payments: [] });
        }
        saveAllData(); close(); renderLoansView(); showToast(loan ? 'Préstamo actualizado' : 'Préstamo agregado', 'success');
      });
    }
    function deleteLoan(id) {
      if (confirm('¿Eliminar este préstamo?')) { loans = loans.filter(l => l.id !== id); saveAllData(); renderLoansView(); showToast('Préstamo eliminado', 'info'); }
    }
    function recordLoanPayment(loanId) {
      const loan = loans.find(l => l.id === loanId);
      if (!loan) return;
      const paidTotal = loan.payments ? loan.payments.reduce((s,p)=>s+p.amount,0) : 0;
      const remaining = loan.principal - paidTotal;
      if (remaining <= 0) { showToast('Préstamo totalmente pagado', 'info'); return; }
      const amount = parseFloat(prompt(`Saldo restante: ${formatCurrency(remaining)}\n¿Cuánto deseas abonar?`, remaining));
      if (!isNaN(amount) && amount > 0 && amount <= remaining) {
        if (!loan.payments) loan.payments = [];
        loan.payments.push({ date: new Date().toISOString().split('T')[0], amount });
        transactions.push({ id: Date.now().toString(), date: new Date().toISOString().split('T')[0], description: `Pago préstamo: ${loan.name}`, amount, type: 'expense', category: 'Préstamos', provider: loan.lender, budgetTag: '' });
        saveAllData(); renderLoansView(); showToast(`Abono de ${formatCurrency(amount)} registrado`, 'success');
      } else if (amount > remaining) showToast('No puedes abonar más que el saldo restante', 'danger');
    }

    function openUploadInvoiceModal() {
      const modalHtml = `<div class="modal-backdrop" id="modalBackdrop"><div class="modal"><div class="modal__header"><h3>Subir factura</h3><button class="modal__close" id="closeModalBtn">&times;</button></div><div class="modal__body"><form id="uploadInvoiceForm"><div class="form-group"><label class="form-label">Nombre del archivo</label><input type="text" id="invoiceName" class="form-control" required></div><div class="form-group"><label class="form-label">Archivo PDF/Imagen</label><input type="file" id="invoiceFile" accept=".pdf,.jpg,.png" required></div><div class="modal__footer"><button type="button" class="btn btn-secondary" id="cancelModalBtn">Cancelar</button><button type="submit" class="btn btn-primary">Subir</button></div></form></div></div></div>`;

      document.getElementById('modalBackdrop')?.addEventListener('click', (e) => { if (e.target === document.getElementById('modalBackdrop')) close(); });
      document.getElementById('uploadInvoiceForm').addEventListener('submit', (e) => {

    function deleteUploadedInvoice(id) {
