    // ========== AGENDA ==========
    function renderCalendarView() {
      const year = currentCalendarYear;
      const month = currentCalendarMonth;
      const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month+1, 0).getDate();
      let calendarHtml = `<div class="calendar-container"><div style="display: flex; justify-content: space-between; margin-bottom: 16px;"><button class="btn btn-secondary" id="prevMonthBtn">◀</button><h3>${monthNames[month]} ${year}</h3><button class="btn btn-secondary" id="nextMonthBtn">▶</button></div><div class="calendar-grid">${['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'].map(d => `<div class="calendar-day-header"><strong>${d}</strong></div>`).join('')}`;
      for (let i = 0; i < firstDay; i++) calendarHtml += '<div></div>';
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const hasEvent = events.some(e => e.date === dateStr);
        const isToday = new Date().toISOString().split('T')[0] === dateStr;
        calendarHtml += `<div class="calendar-day ${hasEvent ? 'has-event' : ''} ${isToday ? 'today' : ''}" data-date="${dateStr}">${d}</div>`;
      }
      calendarHtml += `</div><div style="margin-top: 20px;"><h4>Eventos del día</h4><div id="dayEvents"></div></div><button class="btn btn-primary" id="addEventBtn" style="margin-top: 12px;">+ Añadir evento</button></div>`;
      document.getElementById('dynamicView').innerHTML = calendarHtml;
      document.querySelectorAll('.calendar-day').forEach(day => {
        day.addEventListener('click', () => { const date = day.getAttribute('data-date'); renderEventsForDate(date); });
      });
      document.getElementById('prevMonthBtn').addEventListener('click', () => {
        if (month === 0) { currentCalendarMonth = 11; currentCalendarYear--; } else currentCalendarMonth--;
        renderCalendarView();
      });
      document.getElementById('nextMonthBtn').addEventListener('click', () => {
        if (month === 11) { currentCalendarMonth = 0; currentCalendarYear++; } else currentCalendarMonth++;
        renderCalendarView();
      });
      document.getElementById('addEventBtn').addEventListener('click', () => openEventModal());
      renderEventsForDate(new Date().toISOString().split('T')[0]);
    }
    function renderEventsForDate(dateStr) {
      const container = document.getElementById('dayEvents');
      if (!container) return;
      const dayEvents = events.filter(e => e.date === dateStr);
      if (dayEvents.length === 0) { container.innerHTML = '<div class="text-muted">No hay eventos para este día.</div>'; return; }
      container.innerHTML = dayEvents.map(e => `<div class="module-card"><strong>${escapeHtml(e.title)}</strong><br>${escapeHtml(e.description || '')}<br><button class="btn btn-sm btn-secondary editEventBtn" data-id="${e.id}">✏️</button> <button class="btn btn-sm btn-danger deleteEventBtn" data-id="${e.id}">🗑️</button></div>`).join('');
      document.querySelectorAll('.editEventBtn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); openEventModal(dateStr, id); }));
      document.querySelectorAll('.deleteEventBtn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); if (confirm('¿Eliminar evento?')) { events = events.filter(ev => ev.id !== id); saveAllData(); renderCalendarView(); showToast('Evento eliminado', 'info'); } }));
    }
    function openEventModal(dateStr = null, eventId = null) {
      const event = eventId ? events.find(e => e.id === eventId) : null;
      const modalHtml = `<div class="modal-backdrop" id="modalBackdrop"><div class="modal"><div class="modal__header"><h3>${event ? 'Editar evento' : 'Nuevo evento'}</h3><button class="modal__close" id="closeModalBtn">&times;</button></div><div class="modal__body"><form id="eventForm"><div class="form-group"><label class="form-label">Título</label><input type="text" id="eventTitle" class="form-control" value="${escapeHtml(event?.title || '')}" required></div><div class="form-group"><label class="form-label">Fecha</label><input type="date" id="eventDate" class="form-control" value="${event?.date || dateStr || new Date().toISOString().split('T')[0]}" required></div><div class="form-group"><label class="form-label">Descripción</label><textarea id="eventDesc" class="form-control" rows="3">${escapeHtml(event?.description || '')}</textarea></div><div class="modal__footer"><button type="button" class="btn btn-secondary" id="cancelModalBtn">Cancelar</button><button type="submit" class="btn btn-primary">Guardar</button></div></form></div></div></div>`;
      const container = document.getElementById('modalContainer');
      container.innerHTML = modalHtml;
      const close = () => container.innerHTML = '';
      document.getElementById('closeModalBtn')?.addEventListener('click', close);
      document.getElementById('cancelModalBtn')?.addEventListener('click', close);
      document.getElementById('modalBackdrop')?.addEventListener('click', (e) => { if (e.target === document.getElementById('modalBackdrop')) close(); });
      document.getElementById('eventForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const title = document.getElementById('eventTitle').value.trim();
        const date = document.getElementById('eventDate').value;
        const description = document.getElementById('eventDesc').value;
        if (!title || !date) { showToast('Título y fecha son obligatorios', 'danger'); return; }
        if (event) {
          event.title = title; event.date = date; event.description = description;
          const idx = events.findIndex(ev => ev.id === event.id); events[idx] = event;
        } else {
          events.push({ id: Date.now().toString(), title, date, description });
        }
        saveAllData(); close(); renderCalendarView(); showToast(event ? 'Evento actualizado' : 'Evento añadido', 'success');
      });
    }

    // ========== CATEGORÍAS ==========
    function renderCategoriesView() {
      let html = `<h2>🏷️ Categorías personalizables</h2><div class="lists-container"><div class="list-card"><div class="list-title">💰 Ingresos</div><ul id="incomeCategoriesList"></ul><div class="form-group"><input type="text" id="newIncomeCat" class="form-control" placeholder="Nueva categoría"><button class="btn btn-sm btn-primary" id="addIncomeCatBtn">+ Añadir</button></div></div><div class="list-card"><div class="list-title">💸 Gastos</div><ul id="expenseCategoriesList"></ul><div class="form-group"><input type="text" id="newExpenseCat" class="form-control" placeholder="Nueva categoría"><button class="btn btn-sm btn-primary" id="addExpenseCatBtn">+ Añadir</button></div></div></div>`;
      document.getElementById('dynamicView').innerHTML = html;
      function refreshLists() {
        const incomeList = document.getElementById('incomeCategoriesList');
        const expenseList = document.getElementById('expenseCategoriesList');
        if (incomeList) incomeList.innerHTML = customCategories.income.map(c => `<li>${c} <button class="btn btn-sm btn-danger deleteCatBtn" data-type="income" data-cat="${c}">🗑️</button></li>`).join('');
        if (expenseList) expenseList.innerHTML = customCategories.expense.map(c => `<li>${c} <button class="btn btn-sm btn-danger deleteCatBtn" data-type="expense" data-cat="${c}">🗑️</button></li>`).join('');
        document.querySelectorAll('.deleteCatBtn').forEach(btn => btn.addEventListener('click', (e) => {
          const type = btn.getAttribute('data-type');
          const cat = btn.getAttribute('data-cat');
          if (type === 'income') customCategories.income = customCategories.income.filter(c => c !== cat);
          else customCategories.expense = customCategories.expense.filter(c => c !== cat);
          saveAllData(); refreshLists(); showToast('Categoría eliminada', 'info');
        }));
      }
      document.getElementById('addIncomeCatBtn')?.addEventListener('click', () => {
        const newCat = document.getElementById('newIncomeCat').value.trim();
        if (newCat && !customCategories.income.includes(newCat)) { customCategories.income.push(newCat); saveAllData(); refreshLists(); document.getElementById('newIncomeCat').value = ''; showToast('Categoría añadida', 'success'); }
        else showToast('Categoría ya existe o inválida', 'danger');
      });
      document.getElementById('addExpenseCatBtn')?.addEventListener('click', () => {
        const newCat = document.getElementById('newExpenseCat').value.trim();
        if (newCat && !customCategories.expense.includes(newCat)) { customCategories.expense.push(newCat); saveAllData(); refreshLists(); document.getElementById('newExpenseCat').value = ''; showToast('Categoría añadida', 'success'); }
        else showToast('Categoría ya existe o inválida', 'danger');
      });
      refreshLists();
    }

    // ========== GESTIÓN DE USUARIOS ==========
    function renderUsersView() {
      const companyUsers = companyMembers.filter(m => m.companyId === currentCompanyId);
      const userList = companyUsers.map(m => {
        const user = users.find(u => u.id === m.userId);
        if (!user) return '';
        return `<div class="credit-card"><strong>${user.name} ${user.lastname || ''}</strong><br>Email: ${user.email}<br>Rol: ${m.role}<br><button class="btn btn-sm btn-danger removeUserBtn" data-id="${user.id}">Eliminar usuario</button></div>`;
      }).join('');
      let html = `<h2>👥 Miembros de la empresa</h2><div id="companyUsersList" class="loans-grid">${userList || '<div class="credit-card">No hay otros usuarios</div>'}</div><hr><h3>Invitar usuario</h3><div class="form-group"><label>Email del usuario</label><input type="email" id="inviteEmail" class="form-control"></div><button class="btn btn-primary" id="inviteUserBtn">Enviar invitación</button>`;
      document.getElementById('dynamicView').innerHTML = html;
      document.querySelectorAll('.removeUserBtn').forEach(btn => btn.addEventListener('click', () => {
        const userId = btn.getAttribute('data-id');
        if (userId === currentUser.id) { showToast('No puedes eliminarte a ti mismo', 'danger'); return; }
        if (confirm('¿Eliminar este usuario de la empresa?')) { companyMembers = companyMembers.filter(m => !(m.companyId === currentCompanyId && m.userId === userId)); saveAllData(); renderUsersView(); showToast('Usuario eliminado', 'info'); }
      }));
      document.getElementById('inviteUserBtn').addEventListener('click', () => {
        const email = document.getElementById('inviteEmail').value.trim();
        const user = users.find(u => u.email === email);
        if (!user) { showToast('Usuario no registrado', 'danger'); return; }
        if (companyMembers.some(m => m.companyId === currentCompanyId && m.userId === user.id)) { showToast('El usuario ya es miembro', 'warning'); return; }
        companyMembers.push({ companyId: currentCompanyId, userId: user.id, role: 'member' });
        saveAllData(); renderUsersView(); showToast('Usuario añadido a la empresa', 'success');
      });
    }

    // ========== MÓDULOS EMPRESA ==========
    function renderBusinessModules() {
      const modules = companyData[currentCompanyId]?.companyProfile?.modules || [];
      let html = `<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;"><h2>🏭 Módulos empresariales</h2><button class="btn btn-primary" id="addModuleBtn">+ Añadir módulo</button></div><div id="businessModulesContainer">`;
      if (modules.length === 0) html += `<div class="credit-card">No hay módulos activos. Añade módulos como "Nóminas", "Proveedores", "Clientes", etc.</div>`;
      else {
        modules.forEach(module => {
          html += `<div class="module-card" data-id="${module.id}"><div class="module-header"><input type="text" class="module-title" value="${escapeHtml(module.name)}" data-id="${module.id}" data-field="name" placeholder="Nombre del módulo" style="font-size:1rem; font-weight:600; background:transparent; border:none; border-bottom:1px solid var(--border); margin-bottom:8px;"><div><button class="btn btn-sm btn-secondary editModuleContentBtn" data-id="${module.id}">✏️ Editar contenido</button><button class="btn btn-sm btn-danger deleteModuleBtn" data-id="${module.id}">🗑️ Eliminar</button></div></div><div class="module-content" data-id="${module.id}" contenteditable="false">${module.content || '<em>Haz clic en "Editar contenido" para escribir...</em>'}</div></div>`;
        });
      }
      html += `</div>`;
      document.getElementById('dynamicView').innerHTML = html;
      document.querySelectorAll('.module-title').forEach(input => {
        input.addEventListener('change', (e) => {
          const id = input.getAttribute('data-id');
          const newName = input.value;
          const module = companyData[currentCompanyId].companyProfile.modules.find(m => m.id === id);
          if (module && newName.trim()) { module.name = newName.trim(); saveAllData(); showToast('Título del módulo actualizado', 'success'); }
        });
      });
      document.querySelectorAll('.editModuleContentBtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = btn.getAttribute('data-id');
          const contentDiv = document.querySelector(`.module-content[data-id="${id}"]`);
          if (contentDiv) {
            const isEditable = contentDiv.getAttribute('contenteditable') === 'true';
            if (!isEditable) { contentDiv.setAttribute('contenteditable', 'true'); contentDiv.focus(); btn.textContent = '💾 Guardar contenido'; btn.classList.remove('btn-secondary'); btn.classList.add('btn-success'); }
            else {
              contentDiv.setAttribute('contenteditable', 'false');
              const newContent = contentDiv.innerHTML;
              const module = companyData[currentCompanyId].companyProfile.modules.find(m => m.id === id);
              if (module) { module.content = newContent; saveAllData(); showToast('Contenido guardado', 'success'); }
              btn.textContent = '✏️ Editar contenido'; btn.classList.remove('btn-success'); btn.classList.add('btn-secondary');
            }
          }
        });
      });
      document.querySelectorAll('.deleteModuleBtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = btn.getAttribute('data-id');
          if (confirm('¿Eliminar este módulo?')) { companyData[currentCompanyId].companyProfile.modules = companyData[currentCompanyId].companyProfile.modules.filter(m => m.id !== id); saveAllData(); renderBusinessModules(); showToast('Módulo eliminado', 'info'); }
        });
      });
      document.getElementById('addModuleBtn').addEventListener('click', () => {
        const name = prompt('Nombre del nuevo módulo (ej: Nóminas, Proveedores, Clientes):');
        if (name && name.trim()) {
          if (!companyData[currentCompanyId].companyProfile.modules) companyData[currentCompanyId].companyProfile.modules = [];
          companyData[currentCompanyId].companyProfile.modules.push({ id: Date.now().toString(), name: name.trim(), content: '' });
          saveAllData(); renderBusinessModules(); showToast('Módulo añadido', 'success');
        }
      });
    }

    // ========== BACKUP ==========
    function renderBackupView() {
      const html = `<div><h2>💾 Copia de seguridad</h2><p>Descarga un archivo con todos los datos de esta empresa para restaurarlos más tarde.</p><button class="btn btn-primary" id="backupBtn">💾 Descargar backup</button><hr><h3>Restaurar backup</h3><input type="file" id="restoreFile" accept=".json" class="form-control"><button class="btn btn-secondary" id="restoreBtn" style="margin-top:10px;">📂 Restaurar</button><hr><h3>Exportar datos a CSV</h3><button class="btn btn-secondary" id="exportTransactionsBtn">📎 Exportar transacciones</button><button class="btn btn-secondary" id="exportInvoicesBtn2">📎 Exportar facturas</button></div>`;
      document.getElementById('dynamicView').innerHTML = html;
      document.getElementById('backupBtn')?.addEventListener('click', () => backupData());
      document.getElementById('restoreBtn')?.addEventListener('click', () => {
        const fileInput = document.getElementById('restoreFile');
        if (fileInput.files.length) restoreBackup(fileInput.files[0]);
        else showToast('Selecciona un archivo', 'danger');
      });
      document.getElementById('exportTransactionsBtn')?.addEventListener('click', () => exportToCSV(transactions, 'transacciones.csv'));
      document.getElementById('exportInvoicesBtn2')?.addEventListener('click', () => {
        const all = [...createdInvoices.map(i => ({ tipo: 'manual', numero: i.number, cliente: i.clientName, fecha: i.date, total: i.total })), ...uploadedInvoices.map(i => ({ tipo: 'subida', nombre: i.name, fecha: i.date }))];
        exportToCSV(all, 'facturas.csv');
      });
    }

    // ========== PERFIL ==========
    function renderProfileView() {
      const avatarUrl = currentUser.avatar || '';
      const companyProfile = companyData[currentCompanyId]?.companyProfile || { type: 'individual' };
      const isBusiness = companyProfile.type === 'business';
      let html = `<div><div class="profile-avatar" id="avatarPreview" style="width:80px;height:80px;border-radius:50%;background:var(--accent);margin:0 auto;background-image: url('${avatarUrl}'); background-size: cover; background-position: center; display:flex;align-items:center;justify-content:center;font-size:2rem;">${!avatarUrl ? currentUser.name.charAt(0) : ''}</div><input type="file" id="avatarUpload" accept="image/*" style="display: none;"><button class="btn btn-secondary" id="changeAvatarBtn" style="margin: 0 auto 20px; display: block;">Cambiar foto</button><h3 style="text-align:center;">${currentUser.name} ${currentUser.lastname || ''}</h3><p style="text-align:center; color:var(--text-muted);">${currentUser.email || currentUser.phone}</p><hr><div class="form-group"><label>Nombre</label><input type="text" id="profileName" class="form-control" value="${currentUser.name}"></div><div class="form-group"><label>Apellidos</label><input type="text" id="profileLastname" class="form-control" value="${currentUser.lastname || ''}"></div><div class="form-group"><label>Email</label><input type="email" id="profileEmail" class="form-control" value="${currentUser.email || ''}"></div><div class="form-group"><label>Teléfono</label><input type="tel" id="profilePhone" class="form-control" value="${currentUser.phone || ''}"></div><hr><div class="form-group"><label>Tipo de perfil</label><select id="profileTypeSelect" class="form-control"><option value="individual" ${companyProfile.type === 'individual' ? 'selected' : ''}>Individual</option><option value="business" ${companyProfile.type === 'business' ? 'selected' : ''}>Empresa</option></select></div><div id="businessFields" style="${isBusiness ? 'display:block' : 'display:none'}"><div class="form-group"><label>Tipo de empresa</label><input type="text" id="businessType" class="form-control" value="${escapeHtml(companyProfile.businessType || '')}" placeholder="Ej: Tecnología, Consultoría..."></div><div class="form-group"><label>Especialización</label><input type="text" id="specialization" class="form-control" value="${escapeHtml(companyProfile.specialization || '')}" placeholder="Ej: Desarrollo software, Marketing..."></div><div class="form-group"><label>Número de empleados</label><input type="number" id="employees" class="form-control" value="${companyProfile.employees || 0}"></div><div class="form-group"><label>Capital social ($)</label><input type="number" step="0.01" id="capital" class="form-control" value="${companyProfile.capital || 0}"></div><div class="form-group"><label>Facturación anual ($)</label><input type="number" step="0.01" id="annualRevenue" class="form-control" value="${companyProfile.annualRevenue || 0}"></div><div class="form-group"><label>Forma jurídica</label><input type="text" id="legalForm" class="form-control" value="${escapeHtml(companyProfile.legalForm || '')}" placeholder="Ej: SL, SA, Autónomo..."></div><div class="form-group"><label>Sitio web</label><input type="url" id="website" class="form-control" value="${escapeHtml(companyProfile.website || '')}"></div><div class="form-group"><label>Teléfono adicional</label><input type="text" id="phone2" class="form-control" value="${escapeHtml(companyProfile.phone2 || '')}"></div><div class="form-group"><label>Dirección</label><textarea id="address" class="form-control" rows="2">${escapeHtml(companyProfile.address || '')}</textarea></div></div><button class="btn btn-primary" id="saveProfileBtn">Guardar cambios</button><button class="btn btn-danger" id="deleteAccountBtn" style="margin-top:16px;">Eliminar cuenta</button></div>`;
      document.getElementById('dynamicView').innerHTML = html;
      document.getElementById('changeAvatarBtn').addEventListener('click', () => document.getElementById('avatarUpload').click());
      document.getElementById('avatarUpload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            currentUser.avatar = ev.target.result;
            saveAllData();
            document.getElementById('avatarPreview').style.backgroundImage = `url('${currentUser.avatar}')`;
            document.getElementById('avatarPreview').innerText = '';
            const sidebarAvatar = document.getElementById('sidebarAvatar');
            if (sidebarAvatar) { sidebarAvatar.style.backgroundImage = `url('${currentUser.avatar}')`; sidebarAvatar.innerText = ''; }
            showToast('Foto de perfil actualizada', 'success');
          };
          reader.readAsDataURL(file);
        }
      });
      const profileTypeSelect = document.getElementById('profileTypeSelect');
      const businessFields = document.getElementById('businessFields');
      profileTypeSelect.addEventListener('change', () => { businessFields.style.display = profileTypeSelect.value === 'business' ? 'block' : 'none'; });
      document.getElementById('saveProfileBtn').addEventListener('click', () => {
        currentUser.name = document.getElementById('profileName').value;
        currentUser.lastname = document.getElementById('profileLastname').value;
        currentUser.email = document.getElementById('profileEmail').value;
        currentUser.phone = document.getElementById('profilePhone').value;
        const idx = users.findIndex(u => u.id === currentUser.id);
        if (idx !== -1) users[idx] = currentUser;
        const newProfileType = profileTypeSelect.value;
        companyData[currentCompanyId].companyProfile = {
          type: newProfileType,
          businessType: document.getElementById('businessType')?.value || '',
          specialization: document.getElementById('specialization')?.value || '',
          employees: parseInt(document.getElementById('employees')?.value) || 0,
          capital: parseFloat(document.getElementById('capital')?.value) || 0,
          annualRevenue: parseFloat(document.getElementById('annualRevenue')?.value) || 0,
          legalForm: document.getElementById('legalForm')?.value || '',
          website: document.getElementById('website')?.value || '',
          phone2: document.getElementById('phone2')?.value || '',
          address: document.getElementById('address')?.value || '',
          modules: companyData[currentCompanyId].companyProfile.modules || []
        };
        const companyIdx = companies.findIndex(c => c.id === currentCompanyId);
        if (companyIdx !== -1) companies[companyIdx].profileType = newProfileType;
        saveAllData();
        renderCurrentView();
        showToast('Perfil actualizado', 'success');
      });
      document.getElementById('deleteAccountBtn').addEventListener('click', () => {
        if (confirm('¿Eliminar cuenta permanentemente? Se borrarán todos tus datos.')) {
          users = users.filter(u => u.id !== currentUser.id);
          currentUser = null;
          saveAllData();
          renderApp();
          showToast('Cuenta eliminada', 'info');
        }
      });
    }

    function renderTransactionsPage() { renderDashboard(); }
    
    function renderCurrentView() {
      const userRole = companyMembers.find(m => m.userId === currentUser.id && m.companyId === currentCompanyId)?.role || 'member';
      const isAdmin = userRole === 'admin';
      const companyProfile = companyData[currentCompanyId]?.companyProfile || { type: 'individual' };
      const isBusiness = companyProfile.type === 'business';
      const views = {
        dashboard: renderDashboard,
        transactions: renderTransactionsPage,
        cards: renderCardsView,
        invoices: renderInvoicesView,
        calendar: renderCalendarView,
        budget: renderBudgetView,
        goals: renderGoalsView,
        loans: renderLoansView,
        categories: renderCategoriesView,
        backup: renderBackupView,
        profile: renderProfileView
      };
      if (isAdmin) views.users = renderUsersView;
      if (isBusiness) views.businessModules = renderBusinessModules;
      (views[currentPage] || renderDashboard)();
      const titles = {
        dashboard:'Dashboard', transactions:'Transacciones', cards:'Tarjetas', invoices:'Facturas',
        calendar:'Agenda', budget:'Presupuestos', goals:'Metas de ahorro', loans:'Préstamos',
        categories:'Categorías', users:'Usuarios', businessModules:'Módulos empresa', backup:'Copia de seguridad', profile:'Perfil'
      };
      document.getElementById('pageTitle').innerText = titles[currentPage] || 'Dashboard';
      document.querySelectorAll('.sidebar__link').forEach(link => {
        const page = link.getAttribute('data-page');
        if (page === currentPage) link.classList.add('active');
        else link.classList.remove('active');
      });
    }

    // ========== INICIALIZACIÓN ==========
    function initTheme() {
      document.body.classList.add(currentTheme);
      const themeToggle = document.getElementById('themeToggle');
      const themeMenu = document.getElementById('themeMenu');
      if (themeToggle && themeMenu) {
        themeToggle.addEventListener('click', () => {
          const isVisible = themeMenu.style.display === 'flex';
          themeMenu.style.display = isVisible ? 'none' : 'flex';
          themeToggle.classList.toggle('open', !isVisible);
        });
        document.querySelectorAll('.theme-option').forEach(opt => {
          opt.addEventListener('click', () => {
            const theme = opt.getAttribute('data-theme');
            document.body.classList.remove('cream','dark','blue','cyan','purple');
            document.body.classList.add(theme);
            localStorage.setItem('theme', theme);
            currentTheme = theme;
            themeMenu.style.display = 'none';
            themeToggle.classList.remove('open');
          });
        });
        document.addEventListener('click', (e) => { if (!themeToggle.contains(e.target) && !themeMenu.contains(e.target)) { themeMenu.style.display = 'none'; themeToggle.classList.remove('open'); } });
      }
    }

    function setupNavigation() {
      document.querySelectorAll('.sidebar__link').forEach(link => {
        link.addEventListener('click', (e) => { e.preventDefault(); const page = link.getAttribute('data-page'); if (page) { currentPage = page; renderCurrentView(); } });
      });
      document.getElementById('mobileMenuToggle')?.addEventListener('click', () => { document.getElementById('sidebar').classList.toggle('open'); });
      document.getElementById('globalSearch')?.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        if (currentPage === 'dashboard' || currentPage === 'transactions') {
          const rows = document.querySelectorAll('#transactionsTbody tr');
          rows.forEach(row => row.style.display = row.innerText.toLowerCase().includes(term) ? '' : 'none');
        }
      });
    }

    document.addEventListener('click', (e) => { if (e.target.id === 'newTransactionBtn' || e.target.closest('#newTransactionBtn')) openTransactionModal(); });

    loadAllData();
    renderApp();
  })();
</script>
</body>
